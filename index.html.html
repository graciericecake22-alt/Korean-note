const lookupExamples = (korean, customLib) => {
  if (!korean) return null;
  const key = korean.trim();
  if (customLib[key]) return customLib[key];
  if (BUILTIN_LIBRARY[key]) return BUILTIN_LIBRARY[key];
  const suffixes = ['요', '아요', '어요', '습니다', '입니다'];
  for (const suffix of suffixes) {
    if (key.endsWith(suffix)) {
      const stem = key.slice(0, -suffix.length);
      const candidates = [stem + '다', stem, stem + '하다'];
      for (const c of candidates) {
        if (customLib[c]) return customLib[c];
        if (BUILTIN_LIBRARY[c]) return BUILTIN_LIBRARY[c];
      }
    }
  }
  return null;
};

const detectType = (text) => {
  if (!text) return 'word';
  const trimmed = text.trim();
  if (/[다요까]\.?$|[을를이가은는에서]/.test(trimmed) && trimmed.length > 4) return 'sentence';
  if (/[()→\-~]/.test(trimmed)) return 'grammar';
  return 'word';
};

const speakKorean = (text) => {
  if (!text || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ko-KR';
  utter.rate = 0.9;
  const voices = window.speechSynthesis.getVoices();
  const koVoice = voices.find(v => v.lang.startsWith('ko'));
  if (koVoice) utter.voice = koVoice;
  window.speechSynthesis.speak(utter);
};

const SpeakerButton = ({ text, size = 16, color = '#8B6F47' }) => (
  <button
    onClick={(e) => { e.stopPropagation(); speakKorean(text); }}
    style={{
      background: 'transparent', border: 'none', cursor: 'pointer',
      padding: 6, borderRadius: 6, color,
      display: 'inline-flex', alignItems: 'center',
    }}
    aria-label="发音" title="点击发音"
  >
    <VolumeIcon size={size} />
  </button>
);

// ============ localStorage helpers (replaces window.storage) ============
const lsGet = (key) => {
  try {
    const v = localStorage.getItem(key);
    return v ? { value: v } : null;
  } catch (e) { return null; }
};
const lsSet = (key, value) => {
  try { localStorage.setItem(key, value); return true; }
  catch (e) { console.error('localStorage set failed:', e); return false; }
};

function KoreanNotebook() {
  const [notes, setNotes] = useState([]);
  const [customLib, setCustomLib] = useState({});
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('all');
  const [search, setSearch] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [expandedId, setExpandedId] = useState(null);
  const [showBackupBanner, setShowBackupBanner] = useState(false);
  const [copiedId, setCopiedId] = useState(null);
  const [showImportModal, setShowImportModal] = useState(false);
  const [importText, setImportText] = useState('');
  const [showLibInfo, setShowLibInfo] = useState(false);

  const [form, setForm] = useState({
    type: 'word', korean: '', meaning: '', example: '', note: '', source: 'duolingo',
  });

  const koreanInputRef = useRef(null);
  const fileInputRef = useRef(null);

  useEffect(() => {
    if (window.speechSynthesis) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
  }, []);

  useEffect(() => {
    try {
      const r = lsGet(STORAGE_KEY);
      if (r) setNotes(JSON.parse(r.value));
    } catch (e) {}
    try {
      const r = lsGet(CUSTOM_LIB_KEY);
      if (r) setCustomLib(JSON.parse(r.value));
    } catch (e) {}
    try {
      const last = lsGet(BACKUP_REMINDER_KEY);
      const lastTs = last ? parseInt(last.value, 10) : 0;
      const days = (Date.now() - lastTs) / (1000 * 60 * 60 * 24);
      if (days >= BACKUP_INTERVAL_DAYS) {
        const r = lsGet(STORAGE_KEY);
        if (r && JSON.parse(r.value).length >= 3) setShowBackupBanner(true);
      }
    } catch (e) {}
    setLoading(false);
  }, []);

  useEffect(() => {
    if (loading) return;
    lsSet(STORAGE_KEY, JSON.stringify(notes));
  }, [notes, loading]);

  useEffect(() => {
    if (loading) return;
    lsSet(CUSTOM_LIB_KEY, JSON.stringify(customLib));
  }, [customLib, loading]);

  useEffect(() => {
    if (editingId) return;
    if (form.korean) {
      const d = detectType(form.korean);
      if (d !== form.type) setForm(f => ({ ...f, type: d }));
    }
  }, [form.korean]);

  const resetForm = () => {
    setForm({ type: 'word', korean: '', meaning: '', example: '', note: '', source: 'duolingo' });
    setEditingId(null);
  };

  const openForm = () => {
    resetForm();
    setShowForm(true);
    setTimeout(() => koreanInputRef.current?.focus(), 100);
  };

  const handleSubmit = () => {
    if (!form.korean.trim() || !form.meaning.trim()) return;
    if (editingId) {
      setNotes(notes.map(n => n.id === editingId ? { ...n, ...form, updatedAt: Date.now() } : n));
    } else {
      const n = { ...form, id: Date.now().toString() + Math.random().toString(36).slice(2, 6), createdAt: Date.now(), updatedAt: Date.now() };
      setNotes([n, ...notes]);
    }
    resetForm();
    setShowForm(false);
  };

  const handleEdit = (note) => {
    setForm({ type: note.type, korean: note.korean, meaning: note.meaning, example: note.example || '', note: note.note || '', source: note.source || 'duolingo' });
    setEditingId(note.id);
    setShowForm(true);
    setTimeout(() => koreanInputRef.current?.focus(), 100);
  };

  const handleDelete = (id) => {
    if (confirm('确定要删除这条笔记吗？')) setNotes(notes.filter(n => n.id !== id));
  };

  const adoptExample = (noteId, exampleText) => {
    setNotes(notes.map(n => {
      if (n.id !== noteId) return n;
      const existing = n.example ? n.example + '\n' : '';
      return { ...n, example: existing + exampleText, updatedAt: Date.now() };
    }));
  };

  const copyPromptForClaude = async (note) => {
    const prompt = '请为韩语单词「' + note.korean + '」（意思：' + note.meaning + '）生成 3 个生活化的实用例句。\n\n要求：\n- 简短、贴近日常生活\n- 难度适合初级到中级学习者\n- 自然口语风格\n\n请严格按以下 JSON 格式返回（一段完整的 JSON，方便我直接复制粘贴）：\n\n```json\n{\n  "' + note.korean + '": [\n    {"ko": "韩文例句1", "zh": "中文翻译", "scene": "场景标签"},\n    {"ko": "韩文例句2", "zh": "中文翻译", "scene": "场景标签"},\n    {"ko": "韩文例句3", "zh": "中文翻译", "scene": "场景标签"}\n  ]\n}\n```';
    try {
      await navigator.clipboard.writeText(prompt);
      setCopiedId(note.id);
      setTimeout(() => setCopiedId(null), 2500);
    } catch (e) {
      alert('复制失败，请手动复制：\n\n' + prompt);
    }
  };

  const handleImportLibrary = () => {
    if (!importText.trim()) return;
    try {
      let text = importText.trim();
      const match = text.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (match) text = match[1].trim();
      const data = JSON.parse(text);
      let added = 0, updated = 0;
      const newLib = { ...customLib };
      for (const [word, examples] of Object.entries(data)) {
        if (!Array.isArray(examples)) continue;
        const valid = examples.filter(e => e && e.ko && e.zh).map(e => ({
          ko: String(e.ko), zh: String(e.zh), scene: String(e.scene || ''),
        }));
        if (valid.length === 0) continue;
        if (newLib[word]) updated++; else added++;
        newLib[word] = valid;
      }
      setCustomLib(newLib);
      setImportText('');
      setShowImportModal(false);
      alert('扩展成功！新增 ' + added + ' 个词，更新 ' + updated + ' 个词。');
    } catch (e) {
      alert('导入失败：JSON 格式不正确');
    }
  };

  const handleExport = () => {
    const payload = {
      version: 3,
      exportedAt: new Date().toISOString(),
      notes,
      customLibrary: customLib,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = 'korean-notes-backup-' + date + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    lsSet(BACKUP_REMINDER_KEY, Date.now().toString());
    setShowBackupBanner(false);
  };

  const handleImportClick = () => fileInputRef.current?.click();

  const handleImportFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const imported = Array.isArray(data) ? data : data.notes;
        if (!Array.isArray(imported)) throw new Error();
        const map = new Map(notes.map(n => [n.id, n]));
        let added = 0, updated = 0;
        imported.forEach(n => {
          if (!n.id || !n.korean) return;
          const ex = map.get(n.id);
          if (!ex) { map.set(n.id, n); added++; }
          else if ((n.updatedAt || 0) > (ex.updatedAt || 0)) { map.set(n.id, n); updated++; }
        });
        const merged = Array.from(map.values()).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        setNotes(merged);
        if (data.customLibrary) {
          setCustomLib({ ...customLib, ...data.customLibrary });
        }
        alert('导入成功！新增 ' + added + ' 条笔记，更新 ' + updated + ' 条。');
      } catch (err) {
        alert('导入失败：文件格式不正确');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const dismissBackupBanner = () => {
    setShowBackupBanner(false);
    lsSet(BACKUP_REMINDER_KEY, Date.now().toString());
  };

  const filteredNotes = notes.filter(n => {
    if (activeTab !== 'all' && n.type !== activeTab) return false;
    if (search) {
      const q = search.toLowerCase();
      return n.korean.toLowerCase().includes(q) || n.meaning.toLowerCase().includes(q) ||
        (n.example || '').toLowerCase().includes(q) || (n.note || '').toLowerCase().includes(q);
    }
    return true;
  });

  const counts = {
    all: notes.length,
    word: notes.filter(n => n.type === 'word').length,
    grammar: notes.filter(n => n.type === 'grammar').length,
    sentence: notes.filter(n => n.type === 'sentence').length,
  };

  const getSourceInfo = (id) => SOURCES.find(s => s.id === id) || SOURCES[3];
  const getTypeInfo = (id) => TYPES.find(t => t.id === id) || TYPES[0];

  const builtinCount = Object.keys(BUILTIN_LIBRARY).length;
  const customCount = Object.keys(customLib).length;

  if (loading) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#FAF7F2' }}>
        <div style={{ fontFamily: 'Noto Serif KR, serif', fontSize: 24, color: '#8B6F47' }}>로딩 중...</div>
      </div>
    );
  }

  return (
    <div style={{
      minHeight: '100vh',
      background: 'linear-gradient(135deg, #FAF7F2 0%, #F5EFE6 100%)',
      fontFamily: '"Noto Sans KR", "PingFang SC", -apple-system, sans-serif',
      paddingBottom: 120,
    }}>
      {showBackupBanner && (
        <div style={{ background: '#FFF8E8', borderBottom: '1px solid #E8DFD0', padding: '12px 20px', display: 'flex', alignItems: 'center', gap: 12 }}>
          <AlertIcon size={18} color="#8B5A2B" />
          <div style={{ flex: 1, fontSize: 14, color: '#4A3F2A' }}>已经一周没备份了，建议导出保存到云盘</div>
          <button onClick={handleExport} style={{ background: '#2C2416', color: '#FAF7F2', border: 'none', padding: '6px 12px', borderRadius: 8, fontSize: 13, cursor: 'pointer' }}>立即备份</button>
          <button onClick={dismissBackupBanner} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: '#8B6F47', padding: 4 }}><XIcon size={16} /></button>
        </div>
      )}

      <header style={{ padding: '40px 24px 24px', borderBottom: '1px solid #E8DFD0' }}>
        <div style={{ maxWidth: 720, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16, flexWrap: 'wrap' }}>
          <div>
            <div style={{ fontFamily: 'Fraunces, serif', fontSize: 12, letterSpacing: '3px', color: '#8B6F47', textTransform: 'uppercase', marginBottom: 8 }}>
              Korean · 한국어 · 韩语
            </div>
            <h1 style={{ fontFamily: 'Noto Serif KR, serif', fontSize: 36, fontWeight: 900, color: '#2C2416', margin: 0, letterSpacing: '-0.5px' }}>
              나의 한국어 노트
            </h1>
            <div style={{ fontFamily: 'Fraunces, serif', fontStyle: 'italic', fontSize: 15, color: '#8B6F47', marginTop: 6 }}>
              我的韩语学习笔记本
            </div>
          </div>
          <div style={{ display: 'flex', gap: 6, marginTop: 8, flexWrap: 'wrap' }}>
            <button onClick={() => setShowLibInfo(true)} style={{ background: '#FFFFFF', border: '1px solid #E8DFD0', padding: '8px 12px', borderRadius: 10, fontSize: 13, color: '#4A3F2A', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6 }}>
              <LibraryIcon size={14} />词库 {builtinCount + customCount}
            </button>
            <button onClick={handleImportClick} style={{ background: '#FFFFFF', border: '1px solid #E8DFD0', padding: '8px 12px', borderRadius: 10, fontSize: 13, color: '#4A3F2A', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6 }}>
              <UploadIcon size={14} />导入
            </button>
            <button onClick={handleExport} disabled={notes.length === 0} style={{ background: '#FFFFFF', border: '1px solid #E8DFD0', padding: '8px 12px', borderRadius: 10, fontSize: 13, color: '#4A3F2A', cursor: notes.length === 0 ? 'not-allowed' : 'pointer', opacity: notes.length === 0 ? 0.5 : 1, display: 'flex', alignItems: 'center', gap: 6 }}>
              <DownloadIcon size={14} />备份
            </button>
            <input ref={fileInputRef} type="file" accept=".json" onChange={handleImportFile} style={{ display: 'none' }} />
          </div>
        </div>
      </header>

      <main style={{ maxWidth: 720, margin: '0 auto', padding: '24px' }}>
        <div style={{ position: 'relative', marginBottom: 20 }}>
          <div style={{ position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)', color: '#8B6F47' }}><SearchIcon size={18} /></div>
          <input type="text" placeholder="搜索单词、释义、例句..." value={search} onChange={(e) => setSearch(e.target.value)}
            style={{ width: '100%', padding: '14px 16px 14px 44px', border: '2px solid #E8DFD0', background: '#FAF7F2', borderRadius: 14, fontSize: 15, color: '#2C2416' }} />
        </div>

        <div style={{ display: 'flex', gap: 8, marginBottom: 24, overflowX: 'auto', paddingBottom: 4 }}>
          {[{ id: 'all', label: '全部', count: counts.all }, { id: 'word', label: '单词', count: counts.word }, { id: 'grammar', label: '语法', count: counts.grammar }, { id: 'sentence', label: '例句', count: counts.sentence }].map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={activeTab === tab.id ? 'tab-active' : ''}
              style={{ padding: '10px 18px', background: '#FFFFFF', color: '#2C2416', border: '1px solid #E8DFD0', borderRadius: 24, fontSize: 14, fontWeight: 500, cursor: 'pointer', whiteSpace: 'nowrap', transition: 'all 0.2s' }}>
              {tab.label}<span style={{ marginLeft: 6, fontSize: 12, opacity: 0.6 }}>{tab.count}</span>
            </button>
          ))}
        </div>

        {filteredNotes.length === 0 ? (
          <div style={{ textAlign: 'center', padding: '80px 20px', color: '#8B6F47' }}>
            <div style={{ fontSize: 64, marginBottom: 16, opacity: 0.3 }}>📖</div>
            <div style={{ fontFamily: 'Fraunces, serif', fontStyle: 'italic', fontSize: 18 }}>
              {notes.length === 0 ? '还没有笔记，点击 + 开始记录吧' : '没有匹配的笔记'}
            </div>
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {filteredNotes.map(note => {
              const typeInfo = getTypeInfo(note.type);
              const sourceInfo = getSourceInfo(note.source);
              const isExpanded = expandedId === note.id;
              const examples = note.type === 'word' ? lookupExamples(note.korean, customLib) : null;
              const hasMore = note.example || note.note || note.type === 'word';
              const SourceIconComp = sourceInfo.icon;
              const TypeIconComp = typeInfo.icon;

              return (
                <div key={note.id} className="note-card" style={{ background: '#FFFFFF', borderRadius: 16, padding: 20, border: '1px solid #E8DFD0' }} onClick={() => hasMore && setExpandedId(isExpanded ? null : note.id)}>
                  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12, marginBottom: 10 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                      <span className="type-pill" style={{ background: note.type === 'word' ? '#FFF4E0' : note.type === 'grammar' ? '#FFE8E8' : '#E8F4FF', color: note.type === 'word' ? '#8B5A2B' : note.type === 'grammar' ? '#A03030' : '#2C5282' }}>
                        {typeInfo.label}
                      </span>
                      <span style={{ fontSize: 12, color: sourceInfo.color, display: 'flex', alignItems: 'center', gap: 4 }}>
                        <SourceIconComp size={12} color={sourceInfo.color} />{sourceInfo.label}
                      </span>
                    </div>
                    <div style={{ display: 'flex', gap: 2 }}>
                      <button onClick={(e) => { e.stopPropagation(); handleEdit(note); }} style={{ background: 'transparent', border: 'none', padding: 6, cursor: 'pointer', color: '#8B6F47', borderRadius: 6 }}><EditIcon size={14} /></button>
                      <button onClick={(e) => { e.stopPropagation(); handleDelete(note.id); }} style={{ background: 'transparent', border: 'none', padding: 6, cursor: 'pointer', color: '#8B6F47', borderRadius: 6 }}><TrashIcon size={14} /></button>
                    </div>
                  </div>

                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                    <div style={{ fontFamily: 'Noto Serif KR, serif', fontSize: 24, fontWeight: 700, color: '#2C2416', lineHeight: 1.3, flex: 1 }}>{note.korean}</div>
                    <SpeakerButton text={note.korean} size={18} />
                  </div>

                  <div style={{ fontSize: 15, color: '#4A3F2A', lineHeight: 1.5 }}>{note.meaning}</div>

                  {hasMore && (
                    <div style={{ marginTop: 10, display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, color: '#8B6F47' }}>
                      {isExpanded ? <ChevronUpIcon size={14} /> : <ChevronDownIcon size={14} />}
                      {isExpanded ? '收起' : '展开详情'}
                      {note.type === 'word' && examples && !isExpanded && (
                        <span style={{ marginLeft: 6, padding: '2px 8px', background: '#FAF5EC', color: '#8B5A2B', borderRadius: 10, fontSize: 11 }}>
                          库中有例句
                        </span>
                      )}
                    </div>
                  )}

                  {isExpanded && (
                    <div style={{ marginTop: 14, paddingTop: 14, borderTop: '1px dashed #E8DFD0', display: 'flex', flexDirection: 'column', gap: 14 }} onClick={(e) => e.stopPropagation()}>
                      {note.example && (
                        <div>
                          <div style={{ fontSize: 11, color: '#8B6F47', letterSpacing: 1, marginBottom: 6, textTransform: 'uppercase' }}>我的例句</div>
                          {note.example.split('\n').filter(Boolean).map((line, i) => (
                            <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 6, padding: '6px 0' }}>
                              <div style={{ fontFamily: 'Noto Serif KR, serif', fontSize: 16, color: '#2C2416', lineHeight: 1.6, flex: 1 }}>{line}</div>
                              <SpeakerButton text={line} size={14} />
                            </div>
                          ))}
                        </div>
                      )}

                      {note.note && (
                        <div>
                          <div style={{ fontSize: 11, color: '#8B6F47', letterSpacing: 1, marginBottom: 4, textTransform: 'uppercase' }}>备注</div>
                          <div style={{ fontSize: 14, color: '#4A3F2A', lineHeight: 1.6 }}>{note.note}</div>
                        </div>
                      )}

                      {note.type === 'word' && (
                        <div>
                          <div style={{ fontSize: 11, color: '#8B6F47', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 8 }}>
                            生活化例句
                          </div>

                          {examples ? (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                              {examples.map((ex, i) => (
                                <div key={i} style={{ background: '#FAF5EC', borderRadius: 12, padding: 12, borderLeft: '3px solid #8B5A2B' }}>
                                  {ex.scene && (
                                    <div style={{ fontSize: 10, color: '#8B5A2B', letterSpacing: 0.5, textTransform: 'uppercase', marginBottom: 6, fontWeight: 600 }}>{ex.scene}</div>
                                  )}
                                  <div style={{ display: 'flex', alignItems: 'flex-start', gap: 6, marginBottom: 4 }}>
                                    <div style={{ fontFamily: 'Noto Serif KR, serif', fontSize: 16, color: '#2C2416', lineHeight: 1.5, flex: 1 }}>{ex.ko}</div>
                                    <SpeakerButton text={ex.ko} size={14} />
                                  </div>
                                  <div style={{ fontSize: 13, color: '#6B5638', lineHeight: 1.5, marginBottom: 8 }}>{ex.zh}</div>
                                  <button onClick={() => adoptExample(note.id, ex.ko + ' (' + ex.zh + ')')}
                                    style={{ background: 'transparent', border: '1px solid #8B5A2B', color: '#8B5A2B', padding: '4px 10px', borderRadius: 8, fontSize: 12, cursor: 'pointer' }}>
                                    + 收藏到笔记
                                  </button>
                                </div>
                              ))}
                            </div>
                          ) : (
                            <div style={{ background: '#FFF8E8', borderRadius: 12, padding: 14, border: '1px dashed #E8DFD0' }}>
                              <div style={{ fontSize: 13, color: '#8B6F47', marginBottom: 10, lineHeight: 1.6 }}>
                                库中暂无「{note.korean}」的例句。复制提示语后回到 Claude 对话发送，再用「导入扩展」加入你的库。
                              </div>
                              <button onClick={() => copyPromptForClaude(note)}
                                style={{ background: '#2C2416', color: '#FAF7F2', border: 'none', padding: '8px 14px', borderRadius: 8, fontSize: 13, fontWeight: 500, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                                {copiedId === note.id ? <><CheckIcon size={14} /> 已复制</> : <><CopyIcon size={14} /> 复制提示语</>}
                              </button>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </main>

      {!showForm && !showImportModal && !showLibInfo && (
        <>
          <button onClick={() => setShowImportModal(true)}
            style={{ position: 'fixed', bottom: 32, left: 32, width: 52, height: 52, borderRadius: '50%', background: '#8B5A2B', color: '#FAF7F2', border: 'none', cursor: 'pointer', boxShadow: '0 6px 18px rgba(139, 90, 43, 0.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }}
            aria-label="导入扩展" title="导入 Claude 生成的例句">
            <PasteIcon size={22} />
          </button>
          <button className="fab" onClick={openForm}
            style={{ position: 'fixed', bottom: 32, right: 32, width: 64, height: 64, borderRadius: '50%', background: '#2C2416', color: '#FAF7F2', border: 'none', cursor: 'pointer', boxShadow: '0 8px 24px rgba(44, 36, 22, 0.25)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }}
            aria-label="添加笔记">
            <PlusIcon size={28} />
          </button>
        </>
      )}

      {showLibInfo && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(44, 36, 22, 0.4)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200, padding: 20 }} onClick={() => setShowLibInfo(false)}>
          <div style={{ background: '#FAF7F2', borderRadius: 20, padding: 28, width: '100%', maxWidth: 500 }} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <h2 style={{ fontFamily: 'Noto Serif KR, serif', fontSize: 20, margin: 0, color: '#2C2416' }}>例句库</h2>
              <button onClick={() => setShowLibInfo(false)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: '#8B6F47' }}><XIcon size={22} /></button>
            </div>
            <div style={{ fontSize: 15, color: '#4A3F2A', lineHeight: 1.7 }}>
              <div style={{ marginBottom: 14 }}>
                <strong>📚 内置词库：{builtinCount} 词</strong><br />
                <span style={{ fontSize: 13, color: '#8B6F47' }}>TOPIK 1-2 级核心词汇，离线即用</span>
              </div>
              <div style={{ marginBottom: 14 }}>
                <strong>✨ 你的扩展库：{customCount} 词</strong><br />
                <span style={{ fontSize: 13, color: '#8B6F47' }}>由 Claude 生成、你导入的词条</span>
              </div>
              <div style={{ background: '#FFF8E8', padding: 14, borderRadius: 10, fontSize: 13, lineHeight: 1.7 }}>
                <strong>💡 如何扩展词库：</strong><br />
                1. 在没有例句的单词笔记里，点「复制提示语」<br />
                2. 回到 Claude 对话粘贴发送<br />
                3. 复制 Claude 返回的 JSON<br />
                4. 点左下角紫色「📋」按钮粘贴导入<br />
                5. 之后这个词就永久有例句了！
              </div>
            </div>
          </div>
        </div>
      )}

      {showImportModal && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(44, 36, 22, 0.4)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'flex-end', justifyContent: 'center', zIndex: 200 }} onClick={() => setShowImportModal(false)}>
          <div style={{ background: '#FAF7F2', borderRadius: '24px 24px 0 0', padding: '28px 24px', width: '100%', maxWidth: 600, maxHeight: '85vh', overflowY: 'auto' }} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <h2 style={{ fontFamily: 'Noto Serif KR, serif', fontSize: 22, margin: 0, color: '#2C2416' }}>导入 Claude 例句</h2>
              <button onClick={() => setShowImportModal(false)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: '#8B6F47' }}><XIcon size={24} /></button>
            </div>
            <div style={{ fontSize: 14, color: '#4A3F2A', marginBottom: 14, lineHeight: 1.6 }}>
              把 Claude 返回的 JSON 整段粘贴到下面：
            </div>
            <textarea value={importText} onChange={(e) => setImportText(e.target.value)}
              placeholder='例如：&#10;```json&#10;{&#10;  "사랑": [&#10;    {"ko": "사랑해요.", "zh": "我爱你。", "scene": "表白"}&#10;  ]&#10;}&#10;```'
              rows={10}
              style={{ width: '100%', padding: 12, border: '2px solid #E8DFD0', background: '#FFFFFF', borderRadius: 12, fontSize: 13, fontFamily: 'monospace', color: '#2C2416', resize: 'vertical' }} />
            <div style={{ display: 'flex', gap: 8, marginTop: 16, justifyContent: 'flex-end' }}>
              <button className="btn-ghost" onClick={() => { setImportText(''); setShowImportModal(false); }}>取消</button>
              <button className="btn-primary" onClick={handleImportLibrary} disabled={!importText.trim()}>导入</button>
            </div>
          </div>
        </div>
      )}

      {showForm && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(44, 36, 22, 0.4)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'flex-end', justifyContent: 'center', zIndex: 200 }} onClick={() => { resetForm(); setShowForm(false); }}>
          <div style={{ background: '#FAF7F2', borderRadius: '24px 24px 0 0', padding: '28px 24px', width: '100%', maxWidth: 600, maxHeight: '92vh', overflowY: 'auto' }} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
              <h2 style={{ fontFamily: 'Noto Serif KR, serif', fontSize: 22, fontWeight: 700, color: '#2C2416', margin: 0 }}>
                {editingId ? '编辑笔记' : '새 노트 · 新笔记'}
              </h2>
              <button onClick={() => { resetForm(); setShowForm(false); }} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: '#8B6F47', padding: 4 }}><XIcon size={24} /></button>
            </div>
            <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
              {TYPES.map(t => {
                const TypeBtnIcon = t.icon;
                return (
                  <button key={t.id} onClick={() => setForm({ ...form, type: t.id })}
                    style={{ flex: 1, padding: '10px 8px', background: form.type === t.id ? '#2C2416' : '#FFFFFF', color: form.type === t.id ? '#FAF7F2' : '#2C2416', border: '1px solid ' + (form.type === t.id ? '#2C2416' : '#E8DFD0'), borderRadius: 10, fontSize: 14, fontWeight: 500, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
                    <TypeBtnIcon size={14} />{t.label}
                  </button>
                );
              })}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div>
                <label style={{ fontSize: 12, color: '#8B6F47', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 6, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <span>한국어 · 韩文 *</span>
                  {form.korean && <SpeakerButton text={form.korean} size={14} />}
                </label>
                <input ref={koreanInputRef} type="text" className="form-input korean" placeholder="안녕하세요" value={form.korean} onChange={(e) => setForm({ ...form, korean: e.target.value })} />
              </div>
              <div>
                <label style={{ fontSize: 12, color: '#8B6F47', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 6, display: 'block' }}>中文释义 *</label>
                <input type="text" className="form-input" placeholder="你好" value={form.meaning} onChange={(e) => setForm({ ...form, meaning: e.target.value })} />
              </div>
              <div>
                <label style={{ fontSize: 12, color: '#8B6F47', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 6, display: 'block' }}>
                  例句 {form.type === 'grammar' && <span style={{ color: '#A03030' }}>(推荐)</span>}
                </label>
                <textarea className="form-input" placeholder="저는 학생입니다. (我是学生。)" value={form.example} onChange={(e) => setForm({ ...form, example: e.target.value })} rows={2} style={{ resize: 'vertical', fontFamily: 'Noto Serif KR, serif' }} />
              </div>
              <div>
                <label style={{ fontSize: 12, color: '#8B6F47', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 6, display: 'block' }}>备注（用法、易混淆点等）</label>
                <textarea className="form-input" placeholder="敬语，正式场合使用..." value={form.note} onChange={(e) => setForm({ ...form, note: e.target.value })} rows={2} style={{ resize: 'vertical' }} />
              </div>
              <div>
                <label style={{ fontSize: 12, color: '#8B6F47', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 6, display: 'block' }}>来源</label>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {SOURCES.map(s => {
                    const SrcIcon = s.icon;
                    return (
                      <button key={s.id} onClick={() => setForm({ ...form, source: s.id })}
                        style={{ padding: '8px 14px', background: form.source === s.id ? s.color : '#FFFFFF', color: form.source === s.id ? '#FFFFFF' : '#2C2416', border: '1px solid ' + (form.source === s.id ? s.color : '#E8DFD0'), borderRadius: 20, fontSize: 13, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6 }}>
                        <SrcIcon size={12} color={form.source === s.id ? '#FFFFFF' : '#2C2416'} />{s.label}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 24, justifyContent: 'flex-end' }}>
              <button className="btn-ghost" onClick={() => { resetForm(); setShowForm(false); }}>取消</button>
              <button className="btn-primary" onClick={handleSubmit} disabled={!form.korean.trim() || !form.meaning.trim()}>
                {editingId ? '保存修改' : '저장 · 保存'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<KoreanNotebook />);
</script>
</body>
</html>
